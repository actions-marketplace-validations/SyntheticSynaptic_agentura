version: 1

agent:
  type: http
  endpoint: http://localhost:3456/invoke
  timeout_ms: 30000

consensus:
  models:
    - provider: anthropic
      model: claude-sonnet-4-6
    - provider: openai
      model: gpt-4o
    - provider: google
      model: gemini-pro
  agreement_threshold: 0.80
  on_disagreement: flag
  scope: high_stakes_only
  high_stakes_tools:
    - retrieve_patient_record
    - generate_recommendation

evals:
  - name: accuracy
    type: golden_dataset
    dataset: ./evals/accuracy.jsonl
    scorer: contains
    threshold: 0.65

  - name: quality
    type: llm_judge
    dataset: ./evals/quality.jsonl
    rubric: ./evals/quality_rubric.md
    threshold: 0.80

  - name: conversation
    type: golden_dataset
    dataset: ./evals/conversation.jsonl
    scorer: contains
    threshold: 0.75

  - name: performance
    type: performance
    dataset: ./evals/accuracy.jsonl
    max_p95_ms: 3000
    max_cost_per_call_usd: 0.01

  - name: consensus_check
    type: consensus
    dataset: ./evals/high_stakes.jsonl
    threshold: 0.80
    models:
      - provider: anthropic
        model: claude-sonnet-4-6
      - provider: openai
        model: gpt-4o
      - provider: google
        model: gemini-pro

ci:
  block_on_regression: true
  regression_threshold: 0.05
  compare_to: main
  post_comment: true
  fail_on_new_suite: false
